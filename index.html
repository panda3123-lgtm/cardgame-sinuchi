<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>
エラッタオリジナリティ
</title>


<link rel="stylesheet" href="style.css">


</head>


<body>


<!-- ================= -->
<!-- ホーム -->
<!-- ================= -->

<div id="home-screen" class="screen active">


<h1>
エラッタオリジナリティ
</h1>


<div>

<input
id="username-input"
placeholder="名前"
>


<button onclick="saveProfile()">
保存
</button>


<p id="profile-status">
</p>


</div>



<button onclick="openDeckEditor()">
デッキ編集
</button>



<button onclick="startMatching()">
オンライン対戦
</button>


</div>





<!-- ================= -->
<!-- デッキ編集 -->
<!-- ================= -->


<div id="deck-editor" class="screen">


<h2>
デッキ編集
</h2>


<div id="deck-list">

</div>



<button onclick="saveDeck()">
保存
</button>


<button onclick="closeDeckEditor()">
戻る
</button>


</div>








<!-- ================= -->
<!-- マッチング -->
<!-- ================= -->


<div id="matching-screen" class="screen">


<h2>
対戦相手を探しています...
</h2>


</div>







<!-- ================= -->
<!-- バトル画面 -->
<!-- ================= -->


<div id="battle-screen" class="screen">


<h2>
バトル
</h2>



<div id="enemy-area">


<h3>
相手
</h3>


<div id="enemy-field">

</div>


<p>
LP:
<span id="enemy-lp">
8000
</span>
</p>


</div>





<hr>





<div id="player-area">


<h3>
自分
</h3>


<div id="player-field">

</div>



<p>
LP:
<span id="player-lp">
8000
</span>
</p>



<div id="hand-area">

</div>



</div>





<button onclick="endTurn()">
ターン終了
</button>


</div>





<script src="/socket.io/socket.io.js"></script>

<script src="script.js"></script>


</body>

</html>
