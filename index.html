<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エラッタオリジナリティ</title>
    <!-- ここにCSS等を記述 -->
</head>
<body>

    <!-- 画面の要素（既存のHTML） -->
    <div id="title-screen" class="screen active">
        <button data-target="lobby-screen">ゲームスタート</button>
    </div>
    <div id="lobby-screen" class="screen">
        <input id="input-name" placeholder="名前">
        <button id="btn-join">参加</button>
    </div>
    <div id="battle-screen" class="screen">
        <div id="player-status"></div>
        <div id="opponent-status-area"></div>
        <div id="player-board"></div>
        <div id="player-hand"></div>
        <button id="btn-turn-end">ターン終了</button>
        <div id="battle-log"></div>
    </div>

    <!-- ⚠️ ここが重要！JavaScriptをここに書き込む -->
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
        const GameClient = {
            socket: null,
            gameState: null,
            uiState: { phase: "IDLE", selectedAttackerIndex: null },

            init() {
                this.socket = io('http://localhost:3000');
                this.bindEvents();
            },

            bindEvents() {
                document.addEventListener('click', (e) => {
                    const button = e.target.closest('button[data-target]');
                    if (button) {
                        const targetId = button.getAttribute('data-target');
                        const targetScreen = document.getElementById(targetId);
                        if (targetScreen) {
                            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                            targetScreen.classList.add('active');
                        }
                    }
                });

                document.getElementById("btn-join")?.addEventListener("click", (e) => {
                    const playerName = document.getElementById("input-name")?.value || "ゲスト";
                    this.socket.emit("join-lobby", { name: playerName, deck: [] });
                    e.target.disabled = true;
                });
            },

            renderStatus() {
                const s = this.gameState;
                const p = document.getElementById("player-status");
                if(p) p.innerHTML = s.me.name + "<br>LP: " + s.me.lp;
            }
        };

        window.addEventListener('DOMContentLoaded', () => GameClient.init());
    </script>
</body>
</html>
