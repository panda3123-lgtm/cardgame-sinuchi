<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>エラッタオリジナリティ - Errata Originality</title>
    <link rel="stylesheet" href="style.css">
    <!-- Socket.io (オンライン対戦用・後ほどサーバーと連携) -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <!-- 全体コンテナ（スマホ横画面 16:9 を意識） -->
    <div id="game-container">

        <!-- ================= TITLE SCREEN ================= -->
        <section id="screen-title" class="screen active">
            <div class="title-logo">
                <h1>エラッタオリジナリティ</h1>
                <p>〜 Errata Originality 〜</p>
            </div>
            <button class="btn-main" onclick="Game.switchScreen('screen-menu')">GAME START</button>
        </section>

        <!-- ================= MENU SCREEN ================= -->
        <section id="screen-menu" class="screen">
            <h2>メインメニュー</h2>
            <div class="menu-grid">
                <button class="btn-menu" onclick="Game.switchScreen('screen-battle-setup')">⚔️ オンライン対戦</button>
                <button class="btn-menu" onclick="Game.switchScreen('screen-deck')">📚 デッキ構築</button>
                <button class="btn-menu" onclick="Game.switchScreen('screen-profile')">👤 プロフィール</button>
                <button class="btn-menu" onclick="Game.switchScreen('screen-mission')">🎯 ミッション・実績</button>
            </div>
        </section>

        <!-- ================= DECK SCREEN ================= -->
        <section id="screen-deck" class="screen">
            <div class="screen-header">
                <h2>📚 デッキ構築</h2>
                <button class="btn-back" onclick="Game.switchScreen('screen-menu')">戻る</button>
            </div>
            <div class="deck-workspace">
                <!-- 左側：カードプール（検索・一覧） -->
                <div class="card-pool-area">
                    <div class="search-bar">
                        <input type="text" id="deck-search-input" placeholder="カード名を入力...">
                        <select id="deck-filter-color">
                            <option value="">すべての色</option>
                        </select>
                    </div>
                    <div id="card-pool-list" class="card-grid"></div>
                </div>
                <!-- 右側：現在のデッキリスト -->
                <div class="deck-list-area">
                    <h3>現在のデッキ (<span id="deck-card-count">0</span>/60)</h3>
                    <div id="current-deck-cards"></div>
                    <button class="btn-main" id="btn-save-deck">デッキを保存</button>
                </div>
            </div>
        </section>

        <!-- ================= BATTLE SETUP SCREEN ================= -->
        <section id="screen-battle-setup" class="screen">
            <h2>⚔️ オンライン対戦マッチング</h2>
            <div class="setup-box">
                <p>対戦に使用するデッキを選択してください：</p>
                <select id="battle-deck-select"></select>
                <button class="btn-main" id="btn-start-matching">マッチング開始</button>
                <div id="matching-status" class="hidden">対戦相手を探しています...</div>
                <button class="btn-back" onclick="Game.switchScreen('screen-menu')">戻る</button>
            </div>
        </section>

        <!-- ================= BATTLE SCREEN ================= -->
        <section id="screen-battle" class="screen">
            <!-- バトルフィールド（フェイズ3でJSからダイナミックに描画） -->
            <div class="battle-field">
                <!-- 相手情報・手札 -->
                <div class="field-row opponent-row">
                    <div class="player-status" id="opponent-status">OPPONENT: LP 8000 / COST 0</div>
                    <div class="hand-container" id="opponent-hand"></div>
                </div>
                <!-- 相手バトルエリア・魔法トラップ -->
                <div class="field-row opponent-board">
                    <div class="zone-row" id="opponent-zones"></div>
                    <div class="zone-row" id="opponent-magic-zones"></div>
                </div>
                
                <!-- 中央：フェイズ表示・ログ -->
                <div class="field-center">
                    <div id="current-phase-display">メインフェイズ</div>
                    <div id="battle-log">ゲームが開始されました。</div>
                    <button id="btn-turn-end" class="btn-action">ターン終了</button>
                </div>

                <!-- 自分バトルエリア・魔法トラップ -->
                <div class="field-row player-board">
                    <div class="zone-row" id="player-magic-zones"></div>
                    <div class="zone-row" id="player-zones"></div>
                </div>
                <!-- 自分情報・手札 -->
                <div class="field-row player-row">
                    <div class="player-status" id="player-status">YOU: LP 8000 / COST 1</div>
                    <div class="hand-container" id="player-hand"></div>
                </div>
            </div>
        </section>

        <!-- ================= PROFILE SCREEN ================= -->
        <section id="screen-profile" class="screen">
            <div class="screen-header">
                <h2>👤 プレイヤープロフィール</h2>
                <button class="btn-back" onclick="Game.switchScreen('screen-menu')">戻る</button>
            </div>
            <div class="profile-box">
                <div class="profile-item">
                    <label>プレイヤー名:</label>
                    <input type="text" id="profile-name-input">
                </div>
                <div class="profile-item">
                    <label>現在の称号:</label>
                    <span id="current-title-display">新米調査員</span>
                </div>
                <button class="btn-main" id="btn-save-profile">プロフィール保存</button>
            </div>
        </section>

        <!-- ================= MISSION SCREEN ================= -->
        <section id="screen-mission" class="screen">
            <div class="screen-header">
                <h2>🎯 ミッション・実績</h2>
                <button class="btn-back" onclick="Game.switchScreen('screen-menu')">戻る</button>
            </div>
            <div id="mission-list-container"></div>
        </section>

    </div>

    <!-- 各種ゲームロジックスクリプト -->
    <script src="js/main.js"></script>
    <script src="js/card.js"></script>
    <script src="js/deck.js"></script>
    <script src="js/battle.js"></script>
    <script src="js/effect.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/mission.js"></script>
    <script src="js/online.js"></script>
</body>
</html>
