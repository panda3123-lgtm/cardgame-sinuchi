<section id="deck-screen" class="screen">

    <h2>デッキ編集</h2>


    <div class="deck-layout">


        <!-- カード一覧 -->
        <div id="card-pool">


            <h3>
                カード一覧
            </h3>


            <input
            type="text"
            id="card-search"
            placeholder="カード検索">


            <div id="card-list">

            </div>


        </div>




        <!-- 詳細 -->
        <div id="card-detail">

            カードを選択してください。


        </div>




        <!-- デッキ -->
        <div id="deck-list">

            デッキ

        </div>


    </div>




    <button
    onclick="saveDeck()">

        デッキ保存

    </button>


    <button
    class="back-button">

        戻る

    </button>


</section>
