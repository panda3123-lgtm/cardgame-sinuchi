<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>エラッタオリジナリティ</title>
    <link rel="stylesheet" href="style.css">
    <!-- Socket.io (オンライン対戦用) -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

    <!-- 全体コンテナ -->
    <div id="game-container">

        <!-- ================= TITLE SCREEN ================= -->
        <section id="screen-title" class="screen active">
            <div class="title-logo">
                <h1>エラッタオリジナリティ</h1>
                <p>〜 Errata Originality 〜</p>
            </div>
            <button class="btn-main" data-target="screen-menu">TAP TO START</button>
        </section>

        <!-- ================= MENU SCREEN (ホーム画面) ================= -->
        <section id="screen-menu" class="screen">
            <header class="profile-area">
                <div id="player-icon">👤</div>
                <div>
                    <div id="player-name">プレイヤー</div>
                    <div id="player-title">初心者</div>
                </div>
            </header>
            
            <h2>メインメニュー</h2>
            <div class="menu-grid">
                <button class="btn-menu" data-target="screen-battle-setup">⚔️ オンライン対戦</button>
                <button class="btn-menu" data-target="screen-deck">📚 デッキ構築</button>
                <button class="btn-menu" data-target="screen-profile">👤 プロフィール</button>
                <button class="btn-menu" data-target="screen-mission">🎯 ミッション</button>
                <button class="btn-menu" data-target="screen-setting">⚙ 設定</button>
            </div>
        </section>

        <!-- ================= DECK SCREEN ================= -->
        <section id="screen-deck" class="screen">
            <div class="screen-header">
                <h2>📚 デッキ構築</h2>
                <button class="btn-back" data-target="screen-menu">戻る</button>
            </div>
            <div class="deck-workspace">
                <div class="card-pool-area">
                    <div class="search-bar">
                        <input type="text" id="deck-search-input" placeholder="カード名を入力...">
                    </div>
                    <div id="card-pool-list" class="card-grid">カード一覧</div>
                </div>
                <div class="deck-list-area">
                    <h3>現在のデッキ</h3>
                    <div id="current-deck-cards"></div>
                    <button class="btn-main" id="btn-save-deck">デッキを保存</button>
                </div>
            </div>
        </section>

        <!-- ================= BATTLE SETUP SCREEN ================= -->
        <section id="screen-battle-setup" class="screen">
            <h2>⚔️ オンライン対戦マッチング</h2>
            <div class="setup-box">
                <p>対戦に使用するデッキを選択してください：</p>
                <select id="battle-deck-select"></select>
                <button class="btn-main" data-target="screen-battle">マッチング開始（仮）</button>
                <button class="btn-back" data-target="screen-menu">戻る</button>
            </div>
        </section>

        <!-- ================= BATTLE SCREEN ================= -->
        <section id="screen-battle" class="screen">
            <h2>Battle</h2>
            <div class="battle-field">
                <div id="enemy-area">相手フィールド</div>
                <div id="battle-log">バトルログ</div>
                <div id="player-area">自分フィールド</div>
            </div>
            <div id="hand-area">手札</div>
            <button id="end-turn-button" class="btn-main" data-target="screen-result">ターン終了して結果へ（仮）</button>
        </section>

        <!-- ================= PROFILE SCREEN ================= -->
        <section id="screen-profile" class="screen">
            <div class="screen-header">
                <h2>👤 プロフィール</h2>
                <button class="btn-back" data-target="screen-menu">戻る</button>
            </div>
            <div class="profile-box">
                <p>プレイヤー名: <input type="text" value="プレイヤー"></p>
                <p>現在の称号: 新米調査員</p>
            </div>
        </section>

        <!-- ================= MISSION SCREEN ================= -->
        <section id="screen-mission" class="screen">
            <div class="screen-header">
                <h2>🎯 ミッション</h2>
                <button class="btn-back" data-target="screen-menu">戻る</button>
            </div>
            <p>ミッション一覧がここに入ります</p>
        </section>

        <!-- ================= SETTING SCREEN ================= -->
        <section id="screen-setting" class="screen">
            <div class="screen-header">
                <h2>⚙ 設定</h2>
                <button class="btn-back" data-target="screen-menu">戻る</button>
            </div>
            <div class="setting-list">
                <label>音量 <input type="range"></label><br>
                <label>演出 <input type="checkbox" checked></label>
            </div>
        </section>

        <!-- ================= RESULT SCREEN ================= -->
        <section id="screen-result" class="screen">
            <h1>VICTORY</h1>
            <p>ターン数：<span id="turn-count">5</span></p>
            <button class="btn-main" data-target="screen-menu">ホームへ</button>
        </section>

    </div>

    <!-- JavaScriptの読み込み (一旦main.jsだけに絞って確実に動かす) -->
    <script src="js/main.js"></script>
    <!-- 
      ※他のファイル（card.js, deck.jsなど）は、画面遷移が確実に動くのを
      確認してから1つずつコメントアウトを外していくのが安全です。
    -->
</body>
</html>
