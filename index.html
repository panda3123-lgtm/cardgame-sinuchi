<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エラッタオリジナリティ - 新・完全版</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0a14;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --primary-color: #ff007f;
            --primary-hover: #e0006c;
            --secondary-color: #1a365d;
            --text-color: #f7fafc;
            --border-color: rgba(255, 255, 255, 0.15);
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden;
        }
        .screen {
            display: none;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .panel {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 480px;
            text-align: center;
        }
        h1, h2 {
            margin-top: 0;
            letter-spacing: 2px;
            text-shadow: 0 0 8px var(--primary-color);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 5px 12px rgba(255, 0, 127, 0.3);
        }
        .btn-secondary { background: var(--secondary-color); }
        .btn-secondary:hover { background: #122544; }
        
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            box-sizing: border-box;
        }

        /* デッキ編集 */
        #deck-editor {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        #deck-editor.active {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        .card-pool, .my-deck {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            height: 85vh;
            overflow-y: auto;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
        }
        .card-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .card-item:hover {
            border-color: var(--primary-color);
            background: rgba(255, 0, 127, 0.08);
        }
        .card-item img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        .deck-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px;
            background: rgba(0, 0, 0, 0.25);
            margin-bottom: 5px;
            border-radius: 4px;
            font-size: 12px;
        }
        .remove-btn {
            background: #e53e3e;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            padding: 2px 5px;
        }

        /* 対戦画面 */
        #battle-screen {
            display: none;
            height: 100vh;
            grid-template-rows: 60px 1fr 1fr 130px;
            background: #05050d;
        }
        #battle-screen.active { display: grid; }
        .battle-header { background: rgba(0, 0, 0, 0.75); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border-color); }
        .battle-field { border-bottom: 1px dashed var(--border-color); display: flex; align-items: center; justify-content: center; gap: 15px; position: relative; }
        .battle-hand { display: flex; justify-content: center; gap: 8px; align-items: center; background: rgba(255, 255, 255, 0.01); padding: 8px; overflow-x: auto; }
        
        .field-card {
            width: 75px;
            height: 105px;
            border: 1px solid var(--border-color);
            background-size: cover;
            background-position: center;
            border-radius: 5px;
            position: relative;
            cursor: pointer;
            text-align: center;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            color: white;
            text-shadow: 1px 1px 2px black;
        }
        .field-card .card-atk-badge {
            background: rgba(0, 0, 0, 0.75);
            border-radius: 2px;
            padding: 1px 3px;
            font-weight: bold;
        }
        .status-log {
            position: absolute;
            bottom: 140px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--primary-color);
            padding: 8px 12px;
            border-radius: 4px;
            max-width: 280px;
            font-size: 11px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="panel">
            <h1>ERRATA ORIGINALITY</h1>
            <div style="margin: 15px 0; text-align: left;">
                <label style="font-size: 13px;">👤 プレイヤー名:</label>
                <input type="text" id="username-input" placeholder="名前を入力してください">
                <button class="btn btn-secondary" onclick="saveProfile()">プロフィール保存</button>
                <p id="profile-status" style="font-size: 11px; color: #00ffcc; text-align: center; margin: 5px 0 0 0;"></p>
            </div>
            <button class="btn" onclick="startMatching()">オンライン対戦を探す</button>
            <button class="btn btn-secondary" onclick="openDeckEditor()">デッキ編集</button>
            <div id="status-message" style="margin-top: 15px; color: #ffcc00; font-size: 13px;"></div>
        </div>
    </div>

    <div id="deck-editor" class="screen">
        <div class="card-pool">
            <h2>カードプール</h2>
            <div class="card-grid" id="pool-grid"></div>
        </div>
        <div class="my-deck">
            <h2>マイデッキ (<span id="deck-count">0</span>/60)</h2>
            <button class="btn" onclick="saveDeck()">保存して戻る</button>
            <button class="btn btn-secondary" onclick="closeDeckEditor()">保存せずに戻る</button>
            <div id="deck-list-container" style="margin-top: 15px;"></div>
        </div>
    </div>

    <div id="battle-screen" class="screen">
        <div class="battle-header">
            <div>相手: <span id="opponent-name">???</span> (LP: <span id="opponent-lp">8000</span>) [コスト: <span id="opponent-cost">0</span>]</div>
            <div id="battle-turn-indicator" style="font-weight: bold; color: var(--primary-color);">接続中...</div>
            <div>自分: <span id="my-name">自分</span> (LP: <span id="my-lp">8000</span>) [コスト: <span id="my-cost">0</span>/<span id="my-max-cost">0</span>]</div>
        </div>
        <div class="battle-field" id="opponent-field"></div>
        <div class="battle-field" id="my-field"></div>
        
        <div class="status-log" id="battle-log">対戦相手を待っています...</div>

        <div class="battle-hand" id="my-hand"></div>
        <div style="display: flex; justify-content: center; gap: 10px; background: #000; padding: 6px;">
            <button class="btn btn-secondary" style="width: 130px; margin: 0; padding: 8px;" onclick="endTurn()">ターン終了</button>
            <button class="btn btn-secondary" style="width: 130px; margin: 0; padding: 8px; background-color: #4a154b;" onclick="surrender()">降伏</button>
        </div>
    </div>

    <script>
        // 固定されたRenderサーバーURL
        const SERVER_URL = "https://cardgame-sinuchi.onrender.com"; 
        
        let socket;
        let cardsDatabase = [];
        let myDeck = [];
        let profile = { name: "ゲスト" };

        let gameState = {
            isMyTurn: false,
            myLP: 8000,
            opponentLP: 8000,
            myCost: 0,
            myMaxCost: 0,
            opponentCost: 0,
            myHand: [],
            myField: [],
            opponentField: [],
            myGraveyard: [],
            opponentGraveyard: [],
            isNextSummonFaceDown: false,
            apocalypseCount: 0,
            activeEffects: {
                goshoBonus: false // 五輪書バフ
            }
        };

        // イラスト判定タグ
        const CARD_TAGS = {
            gun: ["一般兵士", "いつの日かの飛鉄「佐貫」", "シュラフ・アリーナ", "自衛用拳銃"],
            sword: ["八影月輪", "黒き刃", "永遠の追放者エリシオン", "静寂の剣士ジーク"],
            katana: ["小夜峰綾香", "カワウソ", "奔花片名代", "ユリカ"],
            blade: [
                "八影月輪", "黒き刃", "永遠の追放者エリシオン", "静寂の剣士ジーク",
                "小夜峰綾香", "カワウソ", "奔花片名代", "ユリカ",
                "氷結の地", "イソナ", "異界の聖槍ロンギヌス", "ラーツ・グローブ"
            ]
        };

        function checkTag(cardName, tag) {
            if (tag === "blade") {
                return CARD_TAGS.katana.includes(cardName) || CARD_TAGS.sword.includes(cardName) || CARD_TAGS.blade.includes(cardName);
            }
            return CARD_TAGS[tag] && CARD_TAGS[tag].includes(cardName);
        }

        window.onload = async () => {
            loadLocalData();
            await loadCardsJSON();
        };

        function loadLocalData() {
            const savedProfile = localStorage.getItem('eo_profile');
            if (savedProfile) {
                profile = JSON.parse(savedProfile);
                document.getElementById('username-input').value = profile.name;
                document.getElementById('profile-status').innerText = `おかえりなさい、${profile.name} さん！`;
            }
            const savedDeck = localStorage.getItem('eo_deck');
            if (savedDeck) myDeck = JSON.parse(savedDeck);
        }

        function saveProfile() {
            const name = document.getElementById('username-input').value.trim();
            if (!name) return alert("名前を入力してください！");
            profile.name = name;
            localStorage.setItem('eo_profile', JSON.stringify(profile));
            document.getElementById('profile-status').innerText = "プロフィールを保存しました！";
        }

        async function loadCardsJSON() {
            try {
                const response = await fetch('cards.json');
                cardsDatabase = await response.json();
            } catch (e) {
                console.error("cards.json の取得に失敗しました", e);
            }
        }

        function openDeckEditor() {
            switchScreen('deck-editor');
            renderCardPool();
            renderMyDeck();
        }

        function closeDeckEditor() {
            switchScreen('home-screen');
        }

        function renderCardPool() {
            const grid = document.getElementById('pool-grid');
            grid.innerHTML = "";
            cardsDatabase.forEach(card => {
                const item = document.createElement('div');
                item.className = 'card-item';
                const imgPath = card.image ? `images/${card.image}` : 'https://via.placeholder.com/130x180?text=No+Image';
                item.innerHTML = `
                    <img src="${imgPath}" alt="${card.name}">
                    <strong>${card.name}</strong><br>
                    コ:${card.cost} / 攻:${card.atk || '-'}
                `;
                item.onclick = () => addCardToDeck(card);
                grid.appendChild(item);
            });
        }

        function addCardToDeck(card) {
            const count = myDeck.filter(c => c.name === card.name).length;
            let limit = 3;
            if (["これあげる", "小夜峰綾香", "シュラフ・アリーナ"].includes(card.name)) limit = 1;
            if (card.name === "ネズミ3.57864") limit = 2;

            if (count >= limit) return alert(`「${card.name}」はデッキに最大 ${limit} 枚までです。`);
            if (myDeck.length >= 60) return alert("デッキは最大60枚までです。");

            myDeck.push(card);
            renderMyDeck();
        }

        function removeCardFromDeck(index) {
            myDeck.splice(index, 1);
            renderMyDeck();
        }

        function renderMyDeck() {
            const container = document.getElementById('deck-list-container');
            container.innerHTML = "";
            document.getElementById('deck-count').innerText = myDeck.length;
            myDeck.forEach((card, index) => {
                const div = document.createElement('div');
                div.className = 'deck-list-item';
                div.innerHTML = `
                    <span>${card.name} (コスト:${card.cost})</span>
                    <button class="remove-btn" onclick="removeCardFromDeck(${index})">削</button>
                `;
                container.appendChild(div);
            });
        }

        function saveDeck() {
            if (myDeck.length < 35 || myDeck.length > 60) {
                return alert("デッキ枚数は35枚〜60枚に調整してください！");
            }
            localStorage.setItem('eo_deck', JSON.stringify(myDeck));
            alert("デッキを保存しました！");
            switchScreen('home-screen');
        }

        function startMatching() {
            if (myDeck.length < 35) return alert("デッキを35枚以上組んでから対戦に参加してください！");
            document.getElementById('status-message').innerText = "対戦サーバーに接続中...";
            
            socket = io(SERVER_URL);

            socket.on('connect', () => {
                document.getElementById('status-message').innerText = "マッチング待機中...";
                socket.emit('join-lobby', { name: profile.name, deckCount: myDeck.length });
            });

            socket.on('match-found', (data) => {
                document.getElementById('status-message').innerText = "対戦相手が見つかりました！";
                document.getElementById('opponent-name').innerText = data.opponent.name;
                document.getElementById('my-name').innerText = profile.name;
                
                gameState.isMyTurn = socket.id < data.roomId;
                
                setTimeout(() => {
                    switchScreen('battle-screen');
                    initBattle();
                }, 1500);
            });

            socket.on('game-action', (action) => {
                handleOpponentAction(action);
            });

            socket.on('opponent-disconnected', () => {
                alert("相手の接続が切れました。あなたの不戦勝です！");
                location.reload();
            });
        }

        function initBattle() {
            gameState.myLP = 8000;
            gameState.opponentLP = 8000;
            gameState.myMaxCost = gameState.isMyTurn ? 1 : 0;
            gameState.myCost = gameState.myMaxCost;
            gameState.myHand = [];
            gameState.myField = [];
            gameState.opponentField = [];
            gameState.myGraveyard = [];
            gameState.opponentGraveyard = [];
            gameState.activeEffects.goshoBonus = false;
            gameState.apocalypseCount = 0;

            gameState.myDeckArray = [...myDeck];
            shuffle(gameState.myDeckArray);

            for (let i = 0; i < 5; i++) drawCard();
            updateUI();
            startTurn();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function drawCard() {
            if (gameState.myDeckArray.length > 0) {
                const card = gameState.myDeckArray.shift();
                gameState.myHand.push(card);
            } else {
                alert("デッキ切れにより敗北しました。");
                surrender();
            }
        }

        function updateUI() {
            document.getElementById('my-lp').innerText = gameState.myLP;
            document.getElementById('opponent-lp').innerText = gameState.opponentLP;
            document.getElementById('my-cost').innerText = gameState.myCost;
            document.getElementById('my-max-cost').innerText = gameState.myMaxCost;
            document.getElementById('opponent-cost').innerText = gameState.opponentCost;
            document.getElementById('battle-turn-indicator').innerText = gameState.isMyTurn ? "あなたのターン" : "相手のターン";

            // 手札描画
            const handContainer = document.getElementById('my-hand');
            handContainer.innerHTML = "";
            gameState.myHand.forEach((card, index) => {
                const btn = document.createElement('div');
                btn.className = 'card-item';
                btn.style.width = '75px';
                btn.style.height = '105px';
                btn.style.fontSize = '9px';
                const imgPath = card.image ? `images/${card.image}` : 'https://via.placeholder.com/130x180?text=No+Image';
                btn.innerHTML = `
                    <img src="${imgPath}" style="width:100%; height:45px; border-radius:3px;">
                    <strong>${card.name}</strong><br>コ:${card.cost}
                `;
                btn.onclick = () => playCard(index);
                handContainer.appendChild(btn);
            });

            // 自分フィールド描画
            const myFieldContainer = document.getElementById('my-field');
            myFieldContainer.innerHTML = "";
            gameState.myField.forEach((card, index) => {
                const div = document.createElement('div');
                div.className = 'field-card';
                const imgPath = card.image ? `images/${card.image}` : 'https://via.placeholder.com/130x180?text=No+Image';
                div.style.backgroundImage = `url(${imgPath})`;
                
                // 五輪書効果（刀・剣持ちのATK+500）
                let displayAtk = card.atk;
                if (card.atk && gameState.activeEffects.goshoBonus && (checkTag(card.name, 'sword') || checkTag(card.name, 'katana'))) {
                    displayAtk += 500;
                }

                div.innerHTML = `
                    <strong>${card.isFaceDown ? "裏向き" : card.name}</strong>
                    ${card.atk ? `<span class="card-atk-badge">ATK:${displayAtk}</span>` : ''}
                `;
                div.onclick = () => attackWithMonster(index, displayAtk);
                myFieldContainer.appendChild(div);
            });

            // 相手フィールド描画
            const oppFieldContainer = document.getElementById('opponent-field');
            oppFieldContainer.innerHTML = "";
            gameState.opponentField.forEach((card, index) => {
                const div = document.createElement('div');
                div.className = 'field-card';
                const imgPath = card.isFaceDown ? 'https://via.placeholder.com/130x180?text=FaceDown' : (card.image ? `images/${card.image}` : 'https://via.placeholder.com/130x180?text=No+Image');
                div.style.backgroundImage = `url(${imgPath})`;
                div.innerHTML = `
                    <strong>${card.isFaceDown ? "裏向き" : card.name}</strong>
                    ${card.atk && !card.isFaceDown ? `<span class="card-atk-badge">ATK:${card.atk}</span>` : ''}
                `;
                oppFieldContainer.appendChild(div);
            });
        }

        function startTurn() {
            if (gameState.isMyTurn) {
                gameState.myMaxCost = Math.min(10, gameState.myMaxCost + 1);
                gameState.myCost = gameState.myMaxCost;
                drawCard();
                checkApocalypseVictory(); // 特殊勝利判定
                updateUI();
                sendGameAction('sync-state', { maxCost: gameState.myMaxCost, cost: gameState.myCost });
                logMsg("あなたのターンが開始されました。1枚ドロー。");
            }
        }

        function endTurn() {
            if (!gameState.isMyTurn) return;
            gameState.isMyTurn = false;
            updateUI();
            sendGameAction('end-turn', {});
            logMsg("ターンを終了しました。");
        }

        function playCard(handIndex) {
            if (!gameState.isMyTurn) return alert("あなたのターンではありません！");
            const card = gameState.myHand[handIndex];

            if (gameState.myCost < card.cost) return alert("コストが足りません！");

            gameState.myCost -= card.cost;
            gameState.myHand.splice(handIndex, 1);

            let playedCard = { ...card, isFaceDown: gameState.isNextSummonFaceDown };
            gameState.isNextSummonFaceDown = false; 

            if (card.type === "モンスター") {
                gameState.myField.push(playedCard);
                logMsg(`モンスター「${card.name}」を召喚しました。`);
            } else {
                gameState.myGraveyard.push(playedCard);
                logMsg(`スペル「${card.name}」を発動しました。`);
            }

            triggerCardEffect(playedCard, true);
            updateUI();
            sendGameAction('play-card', { card: playedCard });
        }

        function attackWithMonster(myIndex, calculatedAtk) {
            if (!gameState.isMyTurn) return alert("あなたのターンではありません！");
            const monster = gameState.myField[myIndex];
            if (monster.type !== "モンスター") return;

            const target = prompt("攻撃対象を選択してください。\n0: 相手プレイヤー\nまたは相手のモンスター番号(1〜)");
            if (target === null) return;

            const targetNum = parseInt(target);
            if (targetNum === 0) {
                gameState.opponentLP = Math.max(0, gameState.opponentLP - calculatedAtk);
                logMsg(`「${monster.name}」で直接攻撃！ ${calculatedAtk} ダメージ！`);
                sendGameAction('sync-lp', { opponentLP: gameState.opponentLP });
            } else {
                const oppIndex = targetNum - 1;
                if (oppIndex >= 0 && oppIndex < gameState.opponentField.length) {
                    const oppMonster = gameState.opponentField[oppIndex];
                    logMsg(`「${monster.name}」で相手の「${oppMonster.name}」を攻撃！`);

                    if (calculatedAtk > oppMonster.atk) {
                        logMsg(`相手の「${oppMonster.name}」を破壊しました！`);
                        sendGameAction('destroy-monster', { oppIndex: oppIndex });
                    } else if (calculatedAtk < oppMonster.atk) {
                        logMsg(`「${monster.name}」が返り討ちに遭いました。`);
                        gameState.myField.splice(myIndex, 1);
                    } else {
                        logMsg("相打ちとなり、両方のモンスターが破壊されました。");
                        gameState.myField.splice(myIndex, 1);
                        sendGameAction('destroy-monster', { oppIndex: oppIndex });
                    }
                }
            }
            updateUI();
        }

        // ─── 完全版効果エンジン ───
        function triggerCardEffect(card, isMyEffect) {
            const p = isMyEffect ? "me" : "opponent";
            const opp = isMyEffect ? "opponent" : "me";
            const myHand = isMyEffect ? gameState.myHand : [];

            switch (card.name) {
                case "マネネ":
                    damageLP(opp, 800);
                    break;
                case "参拝":
                    healLP(p, 500);
                    break;
                case "ケニファー":
                    healLP(p, 700);
                    if (isMyEffect) {
                        gameState.myMaxCost = Math.min(10, gameState.myMaxCost + 1);
                        gameState.myCost = Math.min(10, gameState.myCost + 1);
                    }
                    break;
                case "白翼の大天使ラファエル":
                    healLP(p, 1000);
                    if (isMyEffect) drawCard();
                    break;
                case "蓮の葉ハスター":
                    healLP(p, 500);
                    break;
                case "次回策":
                    if (isMyEffect) {
                        drawCard();
                        drawCard();
                    }
                    break;
                case "寝る子は育つって誰かが言ってた":
                    if (isMyEffect) {
                        gameState.myMaxCost = Math.min(10, gameState.myMaxCost + 2);
                        gameState.myCost = gameState.myMaxCost;
                        endTurn();
                    }
                    break;
                case "やり直し":
                    if (isMyEffect) {
                        gameState.myDeckArray = [...gameState.myDeckArray, ...gameState.myHand, ...gameState.myField];
                        gameState.myHand = [];
                        gameState.myField = [];
                        shuffle(gameState.myDeckArray);
                        for (let i = 0; i < 5; i++) drawCard();
                        sendGameAction('reset-field', {});
                    }
                    break;
                case "また0から":
                    if (isMyEffect) {
                        gameState.myDeckArray = [...gameState.myDeckArray, ...gameState.myHand, ...gameState.myField];
                        gameState.myHand = [];
                        gameState.myField = [];
                        shuffle(gameState.myDeckArray);
                        for (let i = 0; i < 5; i++) drawCard();
                        sendGameAction('reset-field', { forceOpponentReset: true });
                    }
                    break;
                case "F1":
                    if (isMyEffect) {
                        const summonable = myHand.filter(c => c.type === "モンスター" && c.cost <= 3);
                        if (summonable.length > 0) {
                            const names = summonable.map((c, i) => `${i}: ${c.name}`).join("\n");
                            const choice = prompt(`【F1効果】手札からコスト3以下のモンスターを出しますか？番号を入力してください：\n${names}`);
                            const idx = parseInt(choice);
                            if (!isNaN(idx) && idx >= 0 && idx < summonable.length) {
                                const target = summonable[idx];
                                const handIdx = gameState.myHand.findIndex(c => c.name === target.name);
                                if (handIdx !== -1) {
                                    const played = { ...gameState.myHand[handIdx], isFaceDown: false };
                                    gameState.myHand.splice(handIdx, 1);
                                    gameState.myField.push(played);
                                    sendGameAction('play-card', { card: played });
                                }
                            }
                        }
                    }
                    break;
                case "ユリカ":
                    if (isMyEffect) {
                        const animals = myHand.filter(c => c.name === "カワウソ");
                        if (animals.length > 0 && confirm("【ユリカ効果】手札の「カワウソ」をコスト0で召喚しますか？")) {
                            const handIdx = gameState.myHand.findIndex(c => c.name === "カワウソ");
                            if (handIdx !== -1) {
                                const played = { ...gameState.myHand[handIdx], isFaceDown: false };
                                gameState.myHand.splice(handIdx, 1);
                                gameState.myField.push(played);
                                sendGameAction('play-card', { card: played });
                            }
                        }
                    }
                    break;
                case "五輪書":
                    gameState.activeEffects.goshoBonus = true;
                    if (isMyEffect) drawCard();
                    break;
                case "仮面は正体を隠すもの":
                    if (isMyEffect) gameState.isNextSummonFaceDown = true;
                    break;
            }
        }

        function checkApocalypseVictory() {
            const hasCthulhu = gameState.myField.some(c => c.name === "クトゥルフ") || gameState.opponentField.some(c => c.name === "クトゥルフ");
            const hasRlyeh = gameState.myField.some(c => c.name === "ルルイエ") || gameState.opponentField.some(c => c.name === "ルルイエ");
            const hasApocalypse = gameState.myField.some(c => c.name === "世界の滅亡") || gameState.opponentField.some(c => c.name === "世界の滅亡");

            if (hasCthulhu && hasRlyeh && hasApocalypse) {
                gameState.apocalypseCount++;
                logMsg(`滅亡カウントダウン: ${3 - gameState.apocalypseCount} ターン...`);
                if (gameState.apocalypseCount >= 2) {
                    alert("クトゥルフとルルイエが揃い、時が満ちた。世界は滅亡した！");
                    if (gameState.myField.some(c => c.name === "世界の滅亡")) {
                        alert("あなたの特殊勝利です！");
                    } else {
                        alert("相手の特殊勝利です！");
                    }
                    location.reload();
                }
            } else {
                gameState.apocalypseCount = 0;
            }
        }

        function healLP(target, amount) {
            if (target === "me") {
                gameState.myLP += amount;
            } else {
                gameState.opponentLP += amount;
            }
            updateUI();
        }

        function damageLP(target, amount) {
            if (target === "me") {
                gameState.myLP = Math.max(0, gameState.myLP - amount);
                if (gameState.myLP <= 0) {
                    alert("あなたのLPが0になりました。敗北。");
                    location.reload();
                }
            } else {
                gameState.opponentLP = Math.max(0, gameState.opponentLP - amount);
                if (gameState.opponentLP <= 0) {
                    alert("相手のLPが0になりました！あなたの勝利です！");
                    location.reload();
                }
            }
            updateUI();
        }

        function logMsg(text) {
            document.getElementById('battle-log').innerText = text;
        }

        function sendGameAction(type, detail) {
            if (socket) socket.emit('game-action', { type: type, detail: detail });
        }

        function handleOpponentAction(action) {
            const detail = action.detail;
            switch (action.type) {
                case 'sync-state':
                    gameState.opponentCost = detail.cost;
                    updateUI();
                    break;
                case 'play-card':
                    gameState.opponentField.push(detail.card);
                    triggerCardEffect(detail.card, false);
                    updateUI();
                    break;
                case 'end-turn':
                    gameState.isMyTurn = true;
                    startTurn();
                    break;
                case 'destroy-monster':
                    gameState.myField.splice(detail.oppIndex, 1);
                    updateUI();
                    break;
                case 'sync-lp':
                    gameState.myLP = detail.opponentLP;
                    if (gameState.myLP <= 0) {
                        alert("敗北しました。");
                        location.reload();
                    }
                    updateUI();
                    break;
                case 'reset-field':
                    gameState.opponentField = [];
                    if (detail.forceOpponentReset) {
                        gameState.myDeckArray = [...gameState.myDeckArray, ...gameState.myHand, ...gameState.myField];
                        gameState.myHand = [];
                        gameState.myField = [];
                        shuffle(gameState.myDeckArray);
                        for (let i = 0; i < 5; i++) drawCard();
                    }
                    updateUI();
                    break;
                case 'surrender':
                    alert("相手が降伏しました！あなたの勝利です！");
                    location.reload();
                    break;
            }
        }

        function surrender() {
            if (confirm("本当に降伏しますか？")) {
                sendGameAction('surrender', {});
                alert("降伏しました。");
                location.reload();
            }
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
    </script>
</body>
</html>
